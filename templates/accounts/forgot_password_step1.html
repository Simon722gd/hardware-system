{% extends 'base_auth.html' %}

{% block title %}Forgot Password - Step 1{% endblock %}

{% block auth_content %}
<style>
    body {
        background: url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
        background-size: cover;
    }

    .auth-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: -1;
    }

    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .auth-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .auth-title {
        color: #22D3EE;
        font-weight: 700;
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.8rem;
    }
</style>

<div class="auth-overlay"></div>
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Identify Your Account</h2>
        <p class="text-white opacity-75 text-center mb-4">Enter your username to begin the password reset process.</p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_username" class="form-label text-white fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-white border-white border-end-0"><i
                            class="bi bi-person"></i></span>
                    <input type="text" name="username" id="id_username"
                        class="form-control bg-transparent text-white border-white border-start-0"
                        placeholder="Enter your username" required>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary py-2 fw-bold">Continue <i
                        class="bi bi-arrow-right"></i></button>
                <a href="{% url 'accounts:login' %}" class="btn btn-outline-light py-2">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
